name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - run: npm ci
      - run: npm run build:wasm
      - run: npm run build
      - run: npm test --if-present

      - name: Verify WASM files are packed
        run: |
          ls -la wasm/pkg
          test -f wasm/pkg/brass_runtime_wasm_engine.js
          test -f wasm/pkg/brass_runtime_wasm_engine_bg.wasm
          npm pack --dry-run

  node18-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - run: npm ci
      - run: npm run build:wasm
      - run: npm run build

      - name: Verify WASM files are packed
        run: |
          ls -la wasm/pkg
          test -f wasm/pkg/brass_runtime_wasm_engine.js
          test -f wasm/pkg/brass_runtime_wasm_engine_bg.wasm
          npm pack --dry-run

  release:
    runs-on: ubuntu-latest
    needs: [test, node18-smoke]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - run: npm ci
      - run: npm run build
      - run: npm run build:wasm
      - run: rm -f wasm/pkg/.gitignore

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release